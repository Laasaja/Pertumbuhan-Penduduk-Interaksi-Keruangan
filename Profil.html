<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProyekIPAS — Profil Tim</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0a0f;
      --ivory: #f5f0e8;
      --gold: #c9a84c;
      --teal: #2dd4bf;
      --purple: #a78bfa;
    }

    * { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }

    body {
      background: var(--ink);
      color: var(--ivory);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    header {
      position: fixed;
      top:0; left:0; right:0;
      z-index: 100;
      padding: 0 5%;
      display: flex; align-items:center;
      justify-content:space-between;
      height: 72px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }

    .logo { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--gold); }
    nav ul { display:flex; list-style:none; gap:8px; }
    nav a {
      color: rgba(245,240,232,0.65);
      text-decoration: none;
      font-size: 0.85rem; font-weight:500;
      letter-spacing:0.08em; text-transform:uppercase;
      padding: 8px 16px; border-radius:4px;
      transition: all 0.25s;
    }
    nav a:hover, nav a.active { color:var(--ivory); background:rgba(201,168,76,0.12); }

    /* ── PAGE HERO ── */
    .page-hero {
      padding: 140px 5% 80px;
      text-align: center;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(167,139,250,0.08) 0%, transparent 60%), var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .page-label {
      display: inline-flex; align-items:center; gap:10px;
      font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--purple); margin-bottom:20px;
    }
    .page-label::before, .page-label::after {
      content:''; display:block; width:30px; height:1px; background:var(--purple); opacity:0.5;
    }

    .page-hero h1 {
      font-family:'Playfair Display',serif;
      font-size:clamp(2rem,4vw,3.5rem);
      font-weight:900; color:var(--ivory);
    }

    .page-hero p {
      margin-top:16px;
      font-size:1rem; color:rgba(245,240,232,0.5);
    }

    /* ── SCHOOL BAND ── */
    .school-band {
      padding: 28px 5%;
      background: rgba(201,168,76,0.05);
      border-bottom: 1px solid rgba(201,168,76,0.1);
      text-align: center;
    }

    .school-band p {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── TEAM CAROUSEL ── */
    .carousel-section {
      padding: 80px 5%;
      max-width: 900px;
      margin: 0 auto;
    }

    .carousel-container {
      position: relative;
    }

    .carousel-track {
      position: relative;
    }

    .member-card {
      display: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      animation: cardSlide 0.4s ease;
    }

    .member-card.active { display: block; }

    @keyframes cardSlide {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-inner {
      display: flex;
      gap: 0;
    }

    @media (max-width: 640px) {
      .card-inner { flex-direction: column; }
    }

    /* Photo panel */
    .card-photo {
      width: 280px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(45,212,191,0.1));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    @media (max-width:640px) {
      .card-photo { width:100%; border-right:none; border-bottom:1px solid rgba(255,255,255,0.06); padding:40px 24px; }
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      display: flex; align-items:center; justify-content:center;
      font-size: 3rem;
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(167,139,250,0.2);
      overflow: hidden;
    }

    .avatar img {
      width:100%; height:100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .member-index {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.3);
    }

    /* Info panel */
    .card-info {
      flex: 1;
      padding: 48px 40px;
    }

    @media (max-width:640px) {
      .card-info { padding:32px 24px; }
    }

    .card-info h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ivory);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .roles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .role-tag {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .role-tag.primary {
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
    }

    .role-tag.secondary {
      background: rgba(45,212,191,0.08);
      border: 1px solid rgba(45,212,191,0.2);
      color: var(--teal);
    }

    /* Nav controls */
    .carousel-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 32px;
    }

    .nav-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--ivory);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items:center; justify-content:center;
    }

    .nav-btn:hover {
      background: rgba(201,168,76,0.15);
      border-color: rgba(201,168,76,0.3);
      color: var(--gold);
    }

    .dot-nav {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.25s;
    }

    .dot.active {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(201,168,76,0.4);
    }

    /* ── GRID VIEW ── */
    .grid-section {
      padding: 0 5% 80px;
      max-width: 900px;
      margin: 0 auto;
    }

    .grid-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.3);
      text-align: center;
      margin-bottom: 24px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .grid-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .grid-card:hover, .grid-card.active {
      background: rgba(255,255,255,0.06);
      border-color: rgba(201,168,76,0.25);
      transform: translateY(-2px);
    }

    .grid-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      display: flex; align-items:center; justify-content:center;
      font-size: 1.4rem;
      margin: 0 auto 12px;
      overflow: hidden;
    }

    .grid-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

    .grid-card h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ivory);
      margin-bottom: 4px;
    }

    .grid-card span {
      font-size: 0.72rem;
      color: rgba(245,240,232,0.35);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 40px 5%;
      display: flex; align-items:center;
      justify-content:space-between; flex-wrap:wrap; gap:16px;
    }
    footer p { font-size:0.8rem; color:rgba(245,240,232,0.3); }
    .footer-logo { font-family:'Playfair Display',serif; font-size:1rem; color:rgba(201,168,76,0.5); }
  </style>
</head>
<body>

  <header>
    <div class="logo">Proyek IPAS</div>
    <nav>
      <ul>
        <li><a href="Beranda.html">Home</a></li>
        <li><a href="Materi.html">Materi</a></li>
        <li><a href="Timeline.html">Timeline</a></li>
        <li><a href="Profil.html" class="active">Profil</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-hero">
    <div class="page-label">Tim · Proyek IPAS</div>
    <h1>Profil Anggota Tim</h1>
    <p>Kenali tim di balik proyek IPAS ini</p>
  </div>

  <div class="school-band">
    <p>SMKN 1 Katapang</p>
  </div>

  <section class="carousel-section">
    <div class="carousel-container">
      <div class="carousel-track" id="carouselTrack">
        <!-- Cards injected by JS -->
      </div>
      <div class="carousel-nav">
        <button class="nav-btn" id="btnPrev">&#8592;</button>
        <div class="dot-nav" id="dotNav"></div>
        <button class="nav-btn" id="btnNext">&#8594;</button>
      </div>
    </div>
  </section>

  <section class="grid-section">
    <p class="grid-label">Semua Anggota</p>
    <div class="team-grid" id="teamGrid"></div>
  </section>

  <footer>
    <div class="footer-logo">Proyek IPAS</div>
    <p>Sumber: Ruang Guru · Proyek IPAS SMK/MAK Kelas X · KPU KAB-TOLIKARA · bandungbergerak.id</p>
  </footer>

  <script>
    const members = [
      {
        nama: "Maula Ahmad Syahiq",
        jabatan: ["Manager", "Programmer"],
        emoji: "👨‍💼",
        foto: "pics/Maul.jpg"
      },
      {
        nama: "Edgar Dhamas Putra",
        jabatan: ["Programmer"],
        emoji: "💻",
        foto: "pics/Edgar.jpg"
      },
      {
        nama: "Syahdan Maulana Rafansyah",
        jabatan: ["Penyusun Laporan"],
        emoji: "✍️",
        foto: "pics/Syahdan.jpg"
      },
      {
        nama: "Rizki Akbar",
        jabatan: ["Riset Materi"],
        emoji: "🔍",
        foto: "pics/Alex.jpg"
      }
    ];

    let current = 0;

    const track = document.getElementById('carouselTrack');
    const dotNav = document.getElementById('dotNav');
    const grid = document.getElementById('teamGrid');

    // Build carousel cards
    members.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'member-card' + (i === 0 ? ' active' : '');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-photo">
            <div class="avatar">
              <img src="${m.foto}" alt="${m.nama}" onerror="this.parentElement.innerHTML='${m.emoji}'">
            </div>
            <span class="member-index">${String(i+1).padStart(2,'0')} / ${String(members.length).padStart(2,'0')}</span>
          </div>
          <div class="card-info">
            <h2>${m.nama}</h2>
            <div class="roles">
              ${m.jabatan.map((j,idx) => `<span class="role-tag ${idx===0?'primary':'secondary'}">${j}</span>`).join('')}
            </div>
          </div>
        </div>`;
      track.appendChild(card);

      // Dot
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotNav.appendChild(dot);

      // Grid card
      const gc = document.createElement('div');
      gc.className = 'grid-card' + (i === 0 ? ' active' : '');
      gc.innerHTML = `
        <div class="grid-avatar">
          <img src="${m.foto}" alt="${m.nama}" onerror="this.parentElement.innerHTML='${m.emoji}'">
        </div>
        <h4>${m.nama.split(' ')[0]}</h4>
        <span>${m.jabatan[0]}</span>`;
      gc.addEventListener('click', () => goTo(i));
      grid.appendChild(gc);
    });

    function goTo(idx) {
      document.querySelectorAll('.member-card')[current].classList.remove('active');
      document.querySelectorAll('.dot')[current].classList.remove('active');
      document.querySelectorAll('.grid-card')[current].classList.remove('active');

      current = (idx + members.length) % members.length;

      document.querySelectorAll('.member-card')[current].classList.add('active');
      document.querySelectorAll('.dot')[current].classList.add('active');
      document.querySelectorAll('.grid-card')[current].classList.add('active');
    }

    document.getElementById('btnNext').addEventListener('click', () => goTo(current + 1));
    document.getElementById('btnPrev').addEventListener('click', () => goTo(current - 1));
  </script>

</body>
</html>
